<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéDex Analytics Pro | Business Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        
        .stat-bar-bg { @apply w-full bg-slate-100 rounded-full h-1.5 mt-1 overflow-hidden; }
        .stat-bar-fill { @apply h-full rounded-full transition-all duration-1000; }
        .type-badge { @apply text-[9px] px-2 py-0.5 rounded font-black uppercase tracking-tighter shadow-sm inline-block;
        
            color: white !important;}

        .bg-fire { background-color: #ef4444 !important; }
        .bg-water { background-color: #3b82f6 !important; }
        .bg-grass { background-color: #10b981 !important; }
        .bg-electric { background-color: #f59e0b !important; }
        .bg-poison { background-color: #a855f7 !important; }
        .bg-bug { background-color: #84cc16 !important; }
        .bg-normal { background-color: #94a3b8 !important; }
        .bg-flying { background-color: #8b5cf6 !important; }
        .bg-ground { background-color: #b45309 !important; }
        .bg-psychic { background-color: #f43f5e !important; }
        .bg-rock { background-color: #78350f !important; }
        .bg-ice { background-color: #7dd3fc !important; }
        .bg-ghost { background-color: #6366f1 !important; }
        .bg-dragon { background-color: #4338ca !important; }
        .bg-dark { background-color: #1e293b !important; }
        .bg-steel { background-color: #64748b !important; }
        .bg-fairy { background-color: #f472b6 !important; }
        .bg-default { background-color: #64748b !important; }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);}

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }}
        .row-anim { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div id="loginModal" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm border-t-8 border-red-600">
            <div class="mb-8">
                <h2 id="authTitle" class="text-3xl font-black text-slate-800 italic tracking-tighter">POKÉDEX <span class="text-red-600">BI</span></h2>
                <p id="authDesc" class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Inicia sesión para acceder al dataset</p>
            </div>
            <div class="space-y-4">
                <input id="u" type="text" placeholder="Usuario" class="text-slate-800 w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-red-500 font-bold transition-all">
                <input id="p" type="password" placeholder="Contraseña" class="text-slate-800 w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-red-500 font-bold transition-all">
                <button id="mainBtn" onclick="handleAuth()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-red-600 transition-all shadow-lg uppercase tracking-wider">Entrar al Sistema</button>
                <button onclick="toggleAuth()" id="toggleBtn" class="w-full text-[10px] text-slate-400 font-bold hover:text-blue-600 uppercase transition-colors">¿No tienes cuenta? Regístrate aquí</button>
            </div>
        </div>
    </div>

    <div id="appContainer" style="display: none;">
        <nav class="glass-effect sticky top-0 z-40 p-5 px-10 border-b border-slate-200 flex justify-between items-center text-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center text-white font-black italic">P</div>
                <h1 class="text-lg font-black italic uppercase tracking-tighter">Analytics <span class="text-red-600">Dashboard</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="userName" class="text-[10px] font-black bg-slate-100 px-4 py-2 rounded-full uppercase text-slate-500 border border-slate-200"></span>
                <button onclick="location.reload()" class="text-[10px] font-bold text-red-600 hover:underline uppercase">Cerrar Sesión</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
                <div class="lg:col-span-2 bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 flex flex-col md:flex-row gap-4 items-center">
                    <input id="search" type="text" placeholder="Buscar Pokémon..." class="flex-grow text-slate-800 border-2 border-slate-50 p-4 rounded-2xl outline-none focus:border-blue-500 font-medium">
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="search()" class="flex-1 bg-slate-900 text-white px-8 py-4 rounded-2xl font-black hover:bg-slate-800 transition-all uppercase text-sm">Analizar</button>
                        <label class="bg-emerald-500 text-white px-6 py-4 rounded-2xl cursor-pointer font-black hover:bg-emerald-600 transition-all flex items-center gap-2">
                            <span>📷</span> <input type="file" class="hidden" onchange="upload(this)" accept="image/*">
                        </label>
                    </div>
                </div>
                <div class="bg-gradient-to-br from-red-600 to-red-800 p-8 rounded-[2rem] shadow-xl text-white flex flex-col justify-center">
                    <p class="text-[10px] font-black uppercase opacity-70 tracking-[0.2em]">Sincronización</p>
                    <h3 class="text-2xl font-black italic">Dataset <br> Real-Time</h3>
                </div>
            </div>

            <div id="card" class="hidden bg-white rounded-[2.5rem] shadow-2xl overflow-hidden text-slate-800 mb-16 border border-slate-100 flex flex-col md:flex-row">
                <div class="bg-slate-50 p-12 flex justify-center items-center md:w-1/3 border-r border-slate-100">
                    <img id="img" class="h-72 drop-shadow-[0_35px_35px_rgba(0,0,0,0.2)]" src="">
                </div>
                <div class="p-12 flex-grow">
                    <span id="pid" class="text-red-600 font-black text-2xl italic tracking-tighter opacity-50"></span>
                    <h2 id="pname" class="text-7xl font-black capitalize mb-8 tracking-tighter text-slate-900 leading-none">---</h2>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-slate-50 p-4 rounded-2xl">
                            <p class="text-[9px] font-black text-slate-400 uppercase">Exp Base</p>
                            <p id="p_exp" class="text-xl font-black text-slate-800">--</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl">
                            <p class="text-[9px] font-black text-slate-400 uppercase">Habilidad</p>
                            <p id="p_abi" class="text-xl font-black text-slate-800 uppercase italic">--</p>
                        </div>
                    </div>
                    <button id="btnSave" onclick="save()" class="w-full bg-red-600 text-white py-6 rounded-3xl font-black shadow-2xl hover:bg-red-700 transition-all uppercase tracking-widest text-lg">
                        Sincronizar a mi Colección Pokémon
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-slate-200">
                <div class="p-8 bg-slate-50 border-b border-slate-100 flex justify-between items-center text-slate-800">
                    <div>
                        <h3 class="font-black italic uppercase text-sm tracking-tighter">DATA LOGS</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Registros extraídos de Usuarios Registrados</p>
                    </div>
                    <button onclick="loadCollection()" class="bg-white border border-slate-200 text-slate-900 px-6 py-2 rounded-full font-black text-[10px] hover:bg-slate-50 transition-all shadow-sm">RECARGAR DATOS</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50/50 uppercase font-black text-slate-400 border-b text-[9px] tracking-[0.1em]">
                                <th class="p-6">Identificación</th>
                                <th class="p-6">Características (H/W)</th>
                                <th class="p-6">Performance</th>
                                <th class="p-6">Estrategia</th>
                            </tr>
                        </thead>
                        <tbody id="collectionView" class="text-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API = "http://127.0.0.1:8000/api";
        let user = null, currentFullData = null, isRegisterMode = false;

        function toggleAuth() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authTitle').innerHTML = isRegisterMode ? 'REGISTRO <span class="text-emerald-500">BI</span>' : 'POKÉDEX <span class="text-red-600">BI</span>';
            document.getElementById('authDesc').innerText = isRegisterMode ? "Crea tu cuenta de Maestro Pokémon" : "Inicia sesión para acceder al dataset";
            document.getElementById('mainBtn').innerText = isRegisterMode ? "Registrar Cuenta" : "Entrar al Sistema";
            document.getElementById('toggleBtn').innerText = isRegisterMode ? "Ya tengo cuenta, quiero entrar" : "¿No tienes cuenta? Regístrate aquí";}

        async function handleAuth() {
            const username = document.getElementById('u').value.trim();
            const password = document.getElementById('p').value;
            if(!username || !password) return alert("Error: Credenciales incompletas");

            const endpoint = isRegisterMode ? '/register' : '/login';
            try {
                const res = await fetch(`${API}${endpoint}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })});

                if(res.ok) {
                    const data = await res.json();
                    user = data.user;
                    document.getElementById('loginModal').style.display = 'none';
                    document.getElementById('appContainer').style.display = 'block';
                    document.getElementById('userName').innerText = `MAESTRO POKÉMON: ${user}`;
                    loadCollection();
                } else {
                    const err = await res.json();
                    alert(err.detail || "Error de autenticación");
                }
            } catch (e) { alert("Error crítico: El servidor no responde"); }}

        async function search(name = null) {
            const q = name || document.getElementById('search').value;
            if(!q) return;
            
            const cleanQ = q.trim().toLowerCase();
            const res = await fetch(`${API}/pokemon/${cleanQ}`);
            if(res.ok) {
                currentFullData = await res.json();
                document.getElementById('card').classList.remove('hidden');
                document.getElementById('pname').innerText = currentFullData.name;
                document.getElementById('pid').innerText = `#${String(currentFullData.id).padStart(3, '0')}`;
                document.getElementById('p_exp').innerText = currentFullData.base_experience;
                document.getElementById('p_abi').innerText = currentFullData.abilities[0].ability.name;
                document.getElementById('img').src = currentFullData.sprites.other['official-artwork'].front_default;
            } else { alert("Pokémon no encontrado."); }}

        async function upload(el) {
            if(!el.files[0]) return;
            const fd = new FormData(); fd.append('file', el.files[0]);
            const res = await fetch(`${API}/ai-identify`, { method: 'POST', body: fd });
            const data = await res.json();
            if(data.name) await search(data.name);}

        async function save() {
            const res = await fetch(`${API}/favorites`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user, full_data: currentFullData })
            });
            if(res.ok) { 
                alert("DATOS ENVIADOS AL DATASET"); 
                loadCollection();}}

        async function loadCollection() {
            const tbody = document.getElementById('collectionView');
            const res = await fetch(`${API}/collection?user=${user}`);
            const data = await res.json();
            
            if(!data.length) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center text-slate-300 font-bold italic uppercase tracking-widest text-xs">Dataset vacío</td></tr>`;
                return;}

          
            tbody.innerHTML = data.map((i, index) => {
                const typesArray = i.types.split(',');
                return `
                <tr class="border-b border-slate-50 hover:bg-slate-50 transition-all group row-anim" style="animation-delay: ${index * 0.1}s">
                    <td class="p-6">
                        <div class="flex items-center gap-5">
                            <span class="text-2xl font-black text-slate-100 group-hover:text-red-500 transition-colors italic tracking-tighter">#${i.id.padStart(3, '0')}</span>
                            <div>
                                <div class="font-black text-slate-900 text-lg uppercase italic leading-none">${i.name}</div>
                                <div class="flex gap-1 mt-2">
                                    ${typesArray.map(t => {
                                        const typeClean = t.trim().toLowerCase();
                                        return `<span class="type-badge bg-${typeClean}">${t.trim()}</span>`;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    </td>
                    <td class="p-6 text-[11px] font-bold text-slate-400">
                        <div class="space-y-1">
                            <div class="flex justify-between border-b pb-1"><span>ALTURA</span><span class="text-slate-800">${i.h} M</span></div>
                            <div class="flex justify-between pt-1"><span>PESO</span><span class="text-slate-800">${i.w} KG</span></div>
                        </div>
                    </td>
                    <td class="p-6 w-72">
                        <div class="space-y-3">
                            <div>
                                <div class="flex justify-between text-[10px] font-black uppercase"><span>Ataque Base</span> <span>${i.at}</span></div>
                                <div class="stat-bar-bg"><div class="stat-bar-fill bg-red-500" style="width: ${(i.at/200)*100}%"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-[10px] font-black uppercase"><span>Velocidad</span> <span>${i.sp}</span></div>
                                <div class="stat-bar-bg"><div class="stat-bar-fill bg-blue-600" style="width: ${(i.sp/200)*100}%"></div></div>
                            </div>
                        </div>
                    </td>
                    <td class="p-6">
                        <div class="max-w-xs">
                            <p class="text-[10px] font-black text-blue-600 uppercase mb-2">Estrategia</p>
                            <p class="text-[11px] text-slate-500 italic font-medium leading-relaxed">${i.moves}</p>
                            <div class="mt-3 flex items-center gap-2">
                                <span class="text-[9px] bg-emerald-50 text-emerald-700 px-2 py-1 rounded font-black uppercase tracking-widest">${i.skills.split(',')[0]}</span>
                            </div>
                        </div>
                    </td>
                </tr>`;
            }).join('');}
    </script>
</body>
</html>
